<div
  class="rounded-lg border border-slate-200 bg-slate-50 p-4"
  {% if not sempre_visivel %}x-cloak x-show="itensVisiveis >= {{ indice }}"{% endif %}
>
  <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Item {{ indice }}</p>
  <div class="mt-3 grid gap-4 sm:grid-cols-[minmax(0,1fr)_12rem]">
    <div class="min-w-0">
      <label for="{{ material.id_for_label }}" class="block text-sm font-medium text-slate-800">{{ material.label }}</label>
      <select
        name="{{ material.html_name }}"
        id="{{ material.id_for_label }}"
        x-ref="material{{ indice }}"
        x-on:change="mostrarProximo({{ indice }})"
        autocomplete="off"
        class="mt-2 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus-visible:border-blue-500 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500"
      >
        <option value="">Buscar por código ou nome…</option>
        {% for material_disponivel in form.materiais_disponiveis %}
          <option value="{{ material_disponivel.id }}" {% if material.value|stringformat:"s" == material_disponivel.id|stringformat:"s" %}selected{% endif %}>
            {{ material_disponivel.codigo }} — {{ material_disponivel.nome }}
          </option>
        {% endfor %}
      </select>
      {% for error in material.errors %}
        <p class="mt-2 text-sm text-red-700" role="alert">{{ error }}</p>
      {% endfor %}
    </div>

    <div>
      <label for="{{ quantidade.id_for_label }}" class="block text-sm font-medium text-slate-800">{{ quantidade.label }}</label>
      <input
        type="number"
        name="{{ quantidade.html_name }}"
        id="{{ quantidade.id_for_label }}"
        value="{{ quantidade.value|default_if_none:'' }}"
        step="0.001"
        min="0"
        inputmode="decimal"
        autocomplete="off"
        x-ref="quantidade{{ indice }}"
        x-on:input="mostrarProximo({{ indice }})"
        class="mt-2 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm focus-visible:border-blue-500 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-500"
      >
      {% for error in quantidade.errors %}
        <p class="mt-2 text-sm text-red-700" role="alert">{{ error }}</p>
      {% endfor %}
    </div>
  </div>
</div>
